<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>
    Aulita Majalengka - Organisasi Santri Pecinta Alam Al Irsyad Tengaran 2
    </title>

    <title>Aulita Majalengka | Organisasi Santri Pecinta Alam</title>

    <meta name="description"
    content="Website resmi Aulita Majalengka, organisasi santri pecinta alam Pondok Pesantren Islam Al Irsyad Tengaran 2 Majalengka.">

    <meta name="keywords"
    content="Aulita, Majalengka, Pecinta Alam, Santri, Al Irsyad">

    <meta name="author"
    content="Aulita Majalengka">

    <meta property="og:title" content="Aulita Majalengka">

    <meta property="og:description"
    content="Organisasi Santri Pecinta Alam">

    <meta property="og:image"
    ontent="{{ url_for('static', filename='images/logo.png', _external=True) }}">

    <meta property="og:type"
    content="website">

    <link rel="icon"
    href="{{ url_for('static', filename='images/logo.png') }}">
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
          rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet"
          href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>

<!-- Loader -->
<div id="loader">
    <div class="spinner"></div>
</div>

<!-- Progress Bar -->
<div id="progress-bar"></div>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark bg-success shadow fixed-top">

    <div class="container">

        <!-- Logo -->
        <a class="navbar-brand fw-bold d-flex align-items-center" href="/">
            <img src="{{ url_for('static', filename='images/logo.png') }}"
                 width="45"
                 height="45"
                 class="me-2 rounded-circle">

            <div>
                <div>Aulita</div>
                <small class="fw-normal">
                    Aulad Like To Tadabbur Alam
                </small>
            </div>
        </a>

        <!-- Hamburger -->
        <button
            class="navbar-toggler"
            type="button"
            data-bs-toggle="collapse"
            data-bs-target="#navbarNav">

            <span class="navbar-toggler-icon"></span>

        </button>

        <!-- Menu -->
        <div class="collapse navbar-collapse" id="navbarNav">

            <ul class="navbar-nav ms-auto align-items-lg-center">

                <li class="nav-item">
                    <a class="nav-link active" href="/">
                        <i class="bi bi-house-door"></i>
                        Beranda
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="/sejarah">
                        <i class="bi bi-clock-history"></i>
                        Sejarah
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="/galeri">
                        <i class="bi bi-images"></i>
                        Galeri
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="/anggota">
                        <i class="bi bi-people"></i>
                        Anggota
                    </a>
                </li>

                <li class="nav-item ms-lg-3 mt-3 mt-lg-0">
                    <!-- <button
                        class="btn btn-outline-light"
                        onclick="toggleDark()">

                        🌙

                    </button> -->
                </li>

            </ul>

        </div>

    </div>

</nav>

<!-- Isi Halaman -->
<main class="container-fluid px-0" style="padding-top:80px;">

{% block content %}
{% endblock %}

</main>

<!-- Footer -->
<footer class="bg-dark text-light py-5 mt-5">

    <div class="container text-center">

        <h4 class="fw-bold">
            Aulita Majalengka
        </h4>

        <p class="mb-1">
            Aulad Like To Tadabbur Alam
        </p>

        <p class="text-secondary">
            Organisasi Santri Pecinta Alam
        </p>

        <hr>

        <small>
            © 2026 Aulita Majalengka.
            All Rights Reserved.
        </small>

    </div>

</footer>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>

<script src="{{ url_for('static', filename='js/script.js') }}"></script>
<script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
<script>
    AOS.init();
</script>

</body>
</html>
