<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>AULITA Majalengka- Aulad Like To Tadabbur Alam</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

    <!-- Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>


<body>

<!-- PROGRESS BAR -->
<div id="progress-bar"></div>

<!-- LOADER -->
<div id="loader">
    <div class="spinner"></div>
</div>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark bg-success shadow-sm fixed-top">
    <div class="container">

       <a class="navbar-brand d-flex align-items-center" href="/">
    <img src="{{ url_for('static', filename='images/logo.png') }}" 
         alt="AULITA Logo"
         height="40"
         class="me-2">
    <span class="fw-bold">AULITA Majalengka</span>
       </a>

        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto">

                <li class="nav-item">
                    <a class="nav-link" href="/">Beranda</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="/galeri">Galeri</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="/anggota">Anggota</a>
                </li>

            </ul>

            <!-- DARK MODE BUTTON -->
            <button onclick="toggleDark()" class="dark-btn ms-3">🌙</button>

        </div>
    </div>
</nav>

<!-- CONTENT -->
<main style="margin-top: 80px;">
    {% block content %}
    {% endblock %}
</main>

<!-- FOOTER -->
<footer class="bg-dark text-white text-center p-4 mt-5">
    <div class="container">
        <h5>AULITA Majalengka-</h5>
        <p>Aulad Like To Tadabbur Alam</p>
        <small>© 2026 AULITA. All Rights Reserved.</small>
    </div>
</footer>

<!-- JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>
<script src="{{ url_for('static', filename='js/script.js') }}"></script>

</body>
</html>
