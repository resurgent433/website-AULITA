<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Aulita Majalengka - Organisasi Santri Pecinta Alam Al Irsyad Tengaran 2</title>

    <meta name="description" content="Website resmi Aulita Majalengka, organisasi santri pecinta alam Pondok Pesantren Islam Al Irsyad Tengaran 2 Majalengka.">
    <meta name="keywords" content="Aulita, Majalengka, Pecinta Alam, Santri, Al Irsyad, Tadabbur Alam">
    <meta name="author" content="Aulita Majalengka">

    <meta property="og:title" content="Aulita Majalengka">
    <meta property="og:description" content="Organisasi Santri Pecinta Alam">
    <meta property="og:image" content="{{ url_for('static', filename='images/logo.png', _external=True) }}">
    <meta property="og:type" content="website">

    <link rel="icon" href="{{ url_for('static', filename='images/logo.png') }}">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background-color: #f8f9fa;
        }
        /* Mengubah warna dasar hijau Bootstrap ke Hijau Alam yang lebih teduh */
        .bg-success {
            background-color: #1b4d22 !important;
        }
        .text-success {
            color: #1b4d22 !important;
        }
        /* Efek hover pada link menu navigasi */
        .navbar-dark .navbar-nav .nav-link {
            transition: color 0.25s ease-in-out;
            font-weight: 500;
        }
        .navbar-dark .navbar-nav .nav-link:hover {
            color: #a3cfbb !important;
        }
        /* Desain Footer Bertema Hutan Malam */
        .footer-nature {
            background-color: #0f2413;
            color: #e0e5e1;
        }
        .footer-nature hr {
            border-color: rgba(255, 255, 255, 0.15);
        }
    </style>
</head>

<body>

<div id="loader">
    <div class="spinner"></div>
</div>

<div id="progress-bar"></div>

<nav class="navbar navbar-expand-lg navbar-dark bg-success shadow-sm fixed-top py-3">
    <div class="container">
        <a class="navbar-brand fw-bold d-flex align-items-center" href="/">
            <img src="{{ url_for('static', filename='images/logo.png') }}"
                 width="42"
                 height="42"
                 class="me-3 rounded-circle bg-white p-1" alt="Logo">
            <div style="line-height: 1.2;">
                <span class="fs-5 tracking-wide text-uppercase d-block">Aulita</span>
                <small class="fw-light opacity-75" style="font-size: 0.75rem;">
                    Aulad Like To Tadabbur Alam
                </small>
            </div>
        </a>

        <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto gap-2 align-items-lg-center mt-3 mt-lg-0">
                <li class="nav-item">
                    <a class="nav-link px-3" href="/">
                        <i class="bi bi-house-door me-1"></i> Beranda
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link px-3" href="/sejarah">
                        <i class="bi bi-clock-history me-1"></i> Sejarah
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link px-3" href="/galeri">
                        <i class="bi bi-images me-1"></i> Galeri
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link px-3" href="/anggota">
                        <i class="bi bi-people me-1"></i> Anggota
                    </a>
                </li>
            </ul>
        </div>
    </div>
</nav>

<main class="container-fluid px-0" style="padding-top: 76px;">
    {% block content %}
    {% endblock %}
</main>

<footer class="footer-nature py-5">
    <div class="container text-center">
        <h4 class="fw-bold text-uppercase tracking-wider mb-2" style="color: #ffffff;">
            Aulita Majalengka
        </h4>
        <p class="mb-1 opacity-75">
            Aulad Like To Tadabbur Alam
        </p>
        <p class="text-success fw-medium small mb-4">
            <i class="bi bi-shield-fill-check me-1"></i> Organisasi Santri Pecinta Alam
        </p>
        <hr class="my-4">
        <small class="opacity-50">
            &copy; 2026 Aulita Majalengka. All Rights Reserved.
        </small>
    </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
<script src="{{ url_for('static', filename='js/script.js') }}"></script>
<script>
    // Inisialisasi Efek Animasi Muncul saat Di-scroll
    AOS.init({
        duration: 800,
        once: true
    });
</script>

</body>
</html>
